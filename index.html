<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NumAfrik</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0A0E1A;color:#F0F4FF;font-family:sans-serif;overflow-x:hidden;}
    input{background:#1C2537;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:13px 16px;color:#F0F4FF;font-size:14px;outline:none;width:100%;display:block;margin-bottom:14px;}
    button{cursor:pointer;border:none;font-family:sans-serif;}
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;}
    .modal{background:#111827;border-radius:24px 24px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:24px 20px 40px;}
    .handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 20px;}
    .btn-green{background:#00E5A0;color:#0A0E1A;border-radius:12px;padding:15px;font-size:16px;font-weight:800;width:100%;}
    .btn-cancel{background:transparent;color:#7B8DB0;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;font-size:15px;width:100%;margin-top:10px;}
    .btn-red{background:rgba(255,71,87,0.15);color:#FF4757;border:1px solid rgba(255,71,87,0.2);border-radius:12px;padding:14px;font-size:15px;width:100%;margin-top:10px;}
    .row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);cursor:pointer;}
    .info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:14px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = "https://numafrik-backend-production.up.railway.app/api";
const {useState,useEffect,useRef} = React;

const SERVICES = [
  {id:"google",name:"Google / Gmail",icon:"🟦"},
  {id:"whatsapp",name:"WhatsApp",icon:"🟢"},
  {id:"tiktok",name:"TikTok",icon:"⬛"},
  {id:"telegram",name:"Telegram",icon:"🔷"},
  {id:"facebook",name:"Facebook",icon:"🔵"},
  {id:"instagram",name:"Instagram",icon:"🌸"},
  {id:"twitter",name:"Twitter / X",icon:"🐦"},
  {id:"netflix",name:"Netflix",icon:"🔴"},
];

const AMOUNTS = [
  {fcfa:500,credits:5},{fcfa:1000,credits:11},{fcfa:2000,credits:24},
  {fcfa:5000,credits:62},{fcfa:10000,credits:130},{fcfa:20000,credits:270},
];

const PAYS = [
  {name:"T-Money",icon:"📱"},{name:"Flooz",icon:"📱"},
  {name:"MTN MoMo",icon:"📱"},{name:"Wave",icon:"🌊"},{name:"Orange Money",icon:"🍊"},
];

function api(path, method="GET", body=null) {
  const token = localStorage.getItem("numafrik_token");
  return fetch(`${API}${path}`, {
    method,
    headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{})},
    ...(body?{body:JSON.stringify(body)}:{})
  }).then(r=>r.json());
}
  function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [authMode, setAuthMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");
  const [modal, setModal] = useState(null);
  const [tab, setTab] = useState("home");
  const [service, setService] = useState(null);
  const [country, setCountry] = useState(null);
  const [countries, setCountries] = useState([]);
  const [cLoading, setCLoading] = useState(false);
  const [order, setOrder] = useState(null);
  const [sms, setSms] = useState(null);
  const [timer, setTimer] = useState(1200);
  const [history, setHistory] = useState([]);
  const [payIdx, setPayIdx] = useState(0);
  const [amtIdx, setAmtIdx] = useState(2);
  const [copied, setCopied] = useState(false);
  const [oLoading, setOLoading] = useState(false);
  const poll = useRef(null);

  useEffect(() => {
    const t = localStorage.getItem("numafrik_token");
    if (t) api("/users/me").then(d => { if(d.success) setUser(d.user); else localStorage.removeItem("numafrik_token"); setLoading(false); }).catch(()=>setLoading(false));
    else setLoading(false);
  }, []);

  useEffect(() => {
    if (!order || sms) return;
    if (timer <= 0) { cancelOrder(); return; }
    const t = setTimeout(() => setTimer(s=>s-1), 1000);
    return () => clearTimeout(t);
  }, [order, timer, sms]);

  useEffect(() => {
    if (!order || sms) return;
    poll.current = setInterval(() => {
      api(`/orders/${order.orderId}/status`).then(d => {
        if (d.code) { setSms(d.code); clearInterval(poll.current); api("/users/me").then(d=>d.success&&setUser(d.user)); }
      }).catch(()=>{});
    }, 5000);
    return () => clearInterval(poll.current);
  }, [order, sms]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const handleAuth = async () => {
    setError("");
    try {
      const d = authMode==="login"
        ? await api("/auth/login","POST",{email,password})
        : await api("/auth/register","POST",{email,password,name});
      if (d.success) { localStorage.setItem("numafrik_token",d.token); setUser(d.user); }
      else setError(d.error||"Erreur");
    } catch(e) { setError("Erreur réseau"); }
  };

  const loadCountries = async (svc) => {
    setCLoading(true); setCountries([]);
    try { const d = await api(`/orders/countries/${svc}`); if(d.success) setCountries(d.countries); } catch(e) {}
    setCLoading(false);
  };

  const handleBuy = async () => {
    if (!service||!country) return;
    setOLoading(true);
    try {
      const d = await api("/orders/buy","POST",{service:service.id,country:country.code});
      if (d.success) { setOrder(d); setSms(null); setTimer(1200); setModal("active"); api("/users/me").then(d=>d.success&&setUser(d.user)); }
      else alert(d.error||"Erreur");
    } catch(e) { alert("Erreur réseau"); }
    setOLoading(false);
  };

  const cancelOrder = async () => {
    clearInterval(poll.current);
    if (order) { try { await api(`/orders/${order.orderId}/cancel`,"POST",{}); api("/users/me").then(d=>d.success&&setUser(d.user)); } catch(e){} }
    setOrder(null); setSms(null); setModal(null);
  };

  const loadHistory = async () => {
    try { const d = await api("/orders/history"); if(d.success) setHistory(d.orders); } catch(e) {}
  };

  const handlePay = async () => {
    try {
      const d = await api("/payments/initiate","POST",{amount_fcfa:AMOUNTS[amtIdx].fcfa});
      if (d.paymentUrl) window.open(d.paymentUrl,"_blank");
      else alert(d.error||"Erreur paiement");
    } catch(e) { alert("Erreur réseau"); }
  };

  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#00E5A0",fontSize:24}}>Chargement...</div>;

  if (!user) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#111827",border:"1px solid rgba(255,255,255,0.07)",borderRadius:24,padding:"32px 24px",width:"100%",maxWidth:400}}>
        <h1 style={{fontSize:26,fontWeight:800,marginBottom:4}}>Num<span style={{color:"#00E5A0"}}>Afrik</span></h1>
        <p style={{fontSize:14,color:"#7B8DB0",marginBottom:24}}>{authMode==="login"?"Connecte-toi":"Crée ton compte gratuitement"}</p>
        {error && <div style={{background:"rgba(255,71,87,0.1)",border:"1px solid rgba(255,71,87,0.2)",borderRadius:10,padding:12,fontSize:13,color:"#FF4757",marginBottom:14}}>{error}</div>}
        {authMode==="register" && <input placeholder="Nom complet" value={name} onChange={e=>setName(e.target.value)} />}
        <input placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} />
        <input placeholder="Mot de passe" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAuth()} />
        <button className="btn-green" onClick={handleAuth}>{authMode==="login"?"Se connecter":"Créer mon compte"}</button>
        <p style={{textAlign:"center",fontSize:14,color:"#7B8DB0",marginTop:16}}>
          {authMode==="login"?"Pas de compte ? ":"Déjà inscrit ? "}
          <span style={{color:"#00E5A0",cursor:"pointer",fontWeight:600}} onClick={()=>setAuthMode(authMode==="login"?"register":"login")}>
            {authMode==="login"?"S'inscrire":"Se connecter"}
          </span>
        </p>
      </div>
    </div>
  );
    return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",paddingBottom:80}}>
      <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",position:"sticky",top:0,zIndex:100,background:"rgba(10,14,26,0.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <span style={{fontSize:20,fontWeight:800}}>Num<span style={{color:"#00E5A0"}}>Afrik</span></span>
        <span style={{background:"#1C2537",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600}}>{Math.round(user.credits||0)} cr.</span>
        <span style={{width:38,height:38,borderRadius:"50%",background:"#00E5A0",color:"#0A0E1A",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,cursor:"pointer"}} onClick={()=>{localStorage.removeItem("numafrik_token");setUser(null);}}>{(user.name||"?")[0].toUpperCase()}</span>
      </nav>

      <div style={{padding:"24px 20px"}}>
        {tab==="home" && <>
          <div style={{marginBottom:4,fontSize:13,color:"#7B8DB0"}}>Bonjour {user.name?.split(" ")[0]} 👋</div>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:20}}>Ton numéro virtuel <span style={{color:"#00E5A0"}}>en secondes</span></h1>
          <div style={{background:"linear-gradient(135deg,#0D2B1F,#0A1F3A)",border:"1px solid rgba(0,229,160,0.2)",borderRadius:16,padding:20,marginBottom:20}}>
            <div style={{fontSize:11,color:"#7B8DB0",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Solde disponible</div>
            <div style={{fontSize:36,fontWeight:800,color:"#00E5A0"}}>{Math.round(user.credits||0)} <span style={{fontSize:16,color:"#7B8DB0"}}>crédits</span></div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn-green" style={{flex:1,padding:11,fontSize:14}} onClick={()=>setModal("recharge")}>⚡ Recharger</button>
              <button style={{flex:1,background:"#1C2537",color:"#F0F4FF",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:11,fontSize:14}} onClick={()=>{setTab("history");loadHistory();}}>📋 Historique</button>
            </div>
          </div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Services populaires</h3>
          <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8,marginBottom:20}}>
            {SERVICES.filter((_,i)=>i<5).map(s=>(
              <div key={s.id} onClick={()=>{setService(s);setCountry(null);loadCountries(s.id);}} style={{minWidth:85,background:service?.id===s.id?"rgba(0,229,160,0.06)":"#111827",border:`1px solid ${service?.id===s.id?"#00E5A0":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"14px 10px",textAlign:"center",cursor:"pointer",flexShrink:0}}>
                <div style={{fontSize:26,marginBottom:6}}>{s.icon}</div>
                <div style={{fontSize:11,fontWeight:600,color:"#7B8DB0"}}>{s.name.split(" / ")[0]}</div>
              </div>
            ))}
          </div>
          {service && <div style={{marginBottom:14,padding:"12px 16px",background:"#111827",borderRadius:12,border:"1px solid rgba(255,255,255,0.07)",fontSize:13}}>
            <span style={{color:"#7B8DB0"}}>✅ {service.name} — </span>
            {country ? <span style={{color:"#00E5A0",fontWeight:700}}>{country.code} — {country.totalFcfa} FCFA</span>
              : <span style={{color:"#FF6B35",cursor:"pointer"}} onClick={()=>setModal("countries")}>Choisir un pays →</span>}
          </div>}
          <button className="btn-green" style={{width:"100%",marginBottom:12}} onClick={()=>service&&country?setModal("confirm"):setModal("services")} disabled={oLoading}>
            {oLoading?"⟳ Chargement...":"⚡ Commander un numéro"}
          </button>
        </>}

        {tab==="history" && <>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Historique</h2>
          {history.length===0 ? <p style={{color:"#7B8DB0",textAlign:"center",padding:40}}>Aucune commande</p>
            : history.map(h=>(
              <div key={h.id} style={{background:"#111827",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <span style={{fontSize:20}}>{h.status==="RECEIVED"?"✅":h.status==="PENDING"?"⏳":"❌"}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{h.service}</div>
                  <div style={{fontSize:12,color:"#7B8DB0"}}>{h.country}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:800,color:h.status==="RECEIVED"?"#00E5A0":h.status==="PENDING"?"#FF6B35":"#FF4757"}}>{h.sms_code||h.status}</div>
                  <div style={{fontSize:12,color:"#7B8DB0"}}>-{h.cost_fcfa} FCFA</div>
                </div>
              </div>
            ))}
        </>}

        {tab==="profile" && <>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Mon profil</h2>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:"#00E5A0",color:"#0A0E1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:800,margin:"0 auto 12px"}}>{(user.name||"?")[0].toUpperCase()}</div>
            <div style={{fontSize:18,fontWeight:800}}>{user.name}</div>
            <div style={{fontSize:13,color:"#7B8DB0"}}>{user.email}</div>
          </div>
          <div className="info-row"><span style={{color:"#7B8DB0"}}>Solde</span><span style={{fontWeight:700,color:"#00E5A0"}}>{Math.round(user.credits||0)} crédits</span></div>
          <div className="info-row" style={{borderBottom:"none"}}><span style={{color:"#7B8DB0"}}>Membre depuis</span><span style={{fontWeight:700}}>{new Date(user.created_at).toLocaleDateString("fr-FR")}</span></div>
          <button className="btn-green" style={{marginTop:24}} onClick={()=>setModal("recharge")}>⚡ Recharger</button>
          <button className="btn-red" onClick={()=>{localStorage.removeItem("numafrik_token");setUser(null);}}>🚪 Se déconnecter</button>
        </>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(17,24,39,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",padding:"8px 0 20px"}}>
        {[["home","🏠","Accueil"],["order","⚡","Commander"],["history","📋","Historique"],["profile","👤","Profil"]].map(([id,icon,label])=>(
          <div key={id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:8,cursor:"pointer"}} onClick={()=>id==="order"?setModal("services"):(setTab(id),id==="history"&&loadHistory())}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:600,color:tab===id?"#00E5A0":"#7B8DB0"}}>{label}</span>
          </div>
        ))}
      </div>

      {modal==="services" && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="handle"/>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Choisir un service</h2>
          {SERVICES.map(s=><div key={s.id} className="row" onClick={()=>{setService(s);setCountry(null);loadCountries(s.id);setModal("countries");}}>
            <span style={{fontSize:28}}>{s.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:600}}>{s.name}</div><div style={{fontSize:12,color:"#7B8DB0"}}>Disponible dans plusieurs pays</div></div>
            <span style={{color:"#7B8DB0"}}>›</span>
          </div>)}
        </div>
      </div>}

      {modal==="countries" && service && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="handle"/>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Choisir un pays — {service.name}</h2>
          {cLoading ? <p style={{color:"#7B8DB0",textAlign:"center",padding:40}}>Chargement...</p>
            : countries.slice(0,20).map(c=><div key={c.code} className="row" onClick={()=>{setCountry(c);setModal("confirm");}}>
              <span style={{fontSize:24}}>🌍</span>
              <div style={{flex:1}}><div style={{fontWeight:600}}>{c.code}</div><div style={{fontSize:12,color:"#7B8DB0"}}>{c.count?.toLocaleString()} disponibles</div></div>
              <span style={{background:"#00E5A0",color:"#0A0E1A",borderRadius:8,padding:"6px 12px",fontWeight:800}}>{c.totalFcfa} F</span>
            </div>)}
        </div>
      </div>}

      {modal==="confirm" && service && country && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="handle"/>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:16}}>Confirmer</h2>
          <div style={{background:"#1C2537",borderRadius:12,padding:16,marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontSize:32}}>{service.icon}</span>
            <div><div style={{fontWeight:700}}>{service.name}</div><div style={{fontSize:13,color:"#7B8DB0"}}>{country.code}</div></div>
          </div>
          <div className="info-row"><span style={{color:"#7B8DB0"}}>Prix</span><span style={{fontWeight:700,color:"#00E5A0"}}>{country.totalFcfa} FCFA</span></div>
          <div className="info-row"><span style={{color:"#7B8DB0"}}>Votre solde</span><span style={{fontWeight:700,color:user.credits>=country.totalFcfa?"#F0F4FF":"#FF4757"}}>{Math.round(user.credits||0)} FCFA</span></div>
          <div style={{background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:10,padding:12,fontSize:13,color:"#FF6B35",margin:"16px 0",textAlign:"center"}}>⏱ Remboursement automatique si pas de SMS en 20 min</div>
          <button className="btn-green" onClick={handleBuy} disabled={oLoading}>{oLoading?"⟳ Activation...":"⚡ Activer — "+country.totalFcfa+" FCFA"}</button>
          <button className="btn-cancel" onClick={()=>setModal(null)}>Annuler</button>
        </div>
      </div>}

      {modal==="active" && order && <div className="overlay">
        <div className="modal">
          <div className="handle"/>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:16}}>{sms?"✅ SMS Reçu !":"⏳ En attente..."}</h2>
          <div style={{background:"linear-gradient(135deg,#0D2B1F,#091428)",border:"1px solid rgba(0,229,160,0.25)",borderRadius:16,padding:20,marginBottom:16}}>
            <div style={{fontSize:12,color:"#00E5A0",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Votre numéro virtuel</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:2,cursor:"pointer"}} onClick={()=>{navigator.clipboard?.writeText(order.phone);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{order.phone}</div>
            <div style={{fontSize:12,color:"#00E5A0",marginTop:6}}>{copied?"✅ Copié !":"📋 Appuyer pour copier"}</div>
            {!sms && <>
              <div style={{height:6,background:"#1C2537",borderRadius:3,margin:"16px 0 8px",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(timer/1200)*100}%`,background:timer<120?"#FF4757":"#00E5A0",borderRadius:3,transition:"width 1s linear"}}/>
              </div>
              <div style={{fontSize:13,color:"#7B8DB0",textAlign:"right"}}>Expiration dans {fmt(timer)}</div>
            </>}
          </div>
          {sms ? <>
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:12,color:"#7B8DB0",marginBottom:8}}>Code de vérification</div>
              <div style={{fontSize:44,fontWeight:800,color:"#00E5A0",letterSpacing:8}}>{sms}</div>
            </div>
            <button className="btn-green" onClick={()=>{setModal(null);setOrder(null);setSms(null);}}>✅ Terminer</button>
          </> : <>
            <p style={{textAlign:"center",color:"#7B8DB0",fontSize:14,marginBottom:16}}>Entrez ce numéro dans {service?.name?.split(" / ")[0]}...</p>
            <button className="btn-red" onClick={cancelOrder}>🔄 Annuler et rembourser</button>
          </>}
        </div>
      </div>}

      {modal==="recharge" && <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="handle"/>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:6}}>Recharger</h2>
          <p style={{fontSize:13,color:"#7B8DB0",marginBottom:20}}>Choisissez votre moyen de paiement</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {PAYS.map((p,i)=><div key={p.name} onClick={()=>setPayIdx(i)} style={{background:"#1C2537",border:`2px solid ${payIdx===i?"#00E5A0":"rgba(255,255,255,0.07)"}`,borderRadius:12,padding:"14px 10px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:24,marginBottom:6}}>{p.icon}</div>
              <div style={{fontSize:13,fontWeight:700}}>{p.name}</div>
            </div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
            {AMOUNTS.map((a,i)=><div key={i} onClick={()=>setAmtIdx(i)} style={{background:"#1C2537",border:`2px solid ${amtIdx===i?"#00E5A0":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"12px 6px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontWeight:700,fontSize:14,color:amtIdx===i?"#00E5A0":"#F0F4FF"}}>{a.fcfa.toLocaleString()}</div>
              <div style={{fontSize:10,color:"#7B8DB0"}}>FCFA</div>
              <div style={{fontSize:11,fontWeight:700,color:"#00E5A0"}}>+{a.credits} cr.</div>
            </div>)}
          </div>
          <button className="btn-green" onClick={handlePay}>💳 Payer {AMOUNTS[amtIdx].fcfa.toLocaleString()} FCFA via {PAYS[payIdx].name}</button>
          <button className="btn-cancel" onClick={()=>setModal(null)}>Annuler</button>
        </div>
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
